name: Deploy to Hostinger (hPanel)

on:
  push:
    branches:
      - main

# -------------------------------------------------------
# GitHub Secrets required (Settings → Secrets → Actions):
#   FTP_SERVER   → 157.173.209.130   (just the IP, no ftp:// prefix!)
#   FTP_USERNAME → u673877591
#   FTP_PASSWORD → the password you set in hPanel → FTP Accounts
#   FTP_USERNAME → FTP username shown in hPanel → Hosting → FTP Accounts
#   FTP_PASSWORD → FTP password you set in hPanel
# -------------------------------------------------------

jobs:
  web-deploy:
    name: 🚀 Deploy to Hostinger hPanel
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          # Hostinger FTP root is: /home/u673877591/
          # Full path to public_html: domains/fairforestllc.com/public_html/
          server-dir: /
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/README.md
            **/.env*
            **/yarn.lock
            **/package-lock.json
